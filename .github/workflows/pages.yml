name: github-pages

# Builds the web static export and deploys it to GitHub Pages.
# Honest label: this publishes the SAME demo build reviewers run locally —
# simulated data, no secrets, no backend. The API is NOT deployed by this
# workflow (render.yaml covers a demo API deploy).

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Build static export (project-site base path)
        run: npm run build --workspace apps/web
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Deployed API URL for "connected" mode. Set the repo variable
          # NEXT_PUBLIC_API_URL (Settings → Secrets and variables → Actions →
          # Variables) once the Render service from render.yaml exists.
          # Empty → frontend honestly shows STANDALONE DETERMINISTIC DEMO.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
