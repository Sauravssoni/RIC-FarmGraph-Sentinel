name: quality-gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Lint
        run: npm run lint --workspace apps/web
      - name: Typecheck
        run: npm run typecheck --workspace apps/web
      - name: Unit tests
        run: npm run test --workspace apps/web
      - name: Production build (static export)
        run: npm run build --workspace apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r apps/api/requirements.txt pytest
      - name: API tests (including Task 004 evidence continuity)
        run: cd apps/api && python3 -m pytest tests/ -q

  model-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate deterministic evaluation report
        run: |
          python3 scripts/evaluate_model.py \
            --input data/validation/model-contract-fixture.jsonl \
            --output model-contract-report.json \
            --split test \
            --bootstrap 100
      - name: Prove synthetic evidence cannot be promoted
        run: |
          python3 scripts/model_promotion_gate.py \
            --report model-contract-report.json \
            --output model-promotion-decision.json \
            --expect-reject
      - name: Upload model-governance proof
        uses: actions/upload-artifact@v4
        with:
          name: model-contract-${{ github.sha }}
          path: |
            model-contract-report.json
            model-promotion-decision.json
          retention-days: 30

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Build static export
        run: npm run build --workspace apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e (golden + negative + responsive + Pixel offline PWA)
        run: npm run e2e
        env:
          PLAYWRIGHT_NO_EXECUTABLE_PATH: "1"
      - name: Upload browser and mobile evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence-root-${{ github.sha }}
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
          if-no-files-found: warn
          retention-days: 30

  connected-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install web and API dependencies
        run: |
          npm ci
          pip install -r apps/api/requirements.txt pytest
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Browser → FastAPI → KVK pack evidence-continuity proof
        run: npm run e2e:connected
        env:
          PLAYWRIGHT_NO_EXECUTABLE_PATH: "1"

  e2e-subpath:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e under GitHub Pages base path
        run: npm run e2e:subpath
        env:
          PLAYWRIGHT_NO_EXECUTABLE_PATH: "1"
      - name: Upload subpath browser and mobile evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence-subpath-${{ github.sha }}
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
          if-no-files-found: warn
          retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: npm audit (high severity and above)
        run: npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (API dependencies)
        run: |
          pip install pip-audit
          pip-audit -r apps/api/requirements.txt
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2

  release-gate:
    name: release-gate
    needs: [web, api, model-contract, e2e, connected-e2e, e2e-subpath]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Verify mandatory gates
        env:
          WEB: ${{ needs.web.result }}
          API: ${{ needs.api.result }}
          MODEL: ${{ needs['model-contract'].result }}
          E2E: ${{ needs.e2e.result }}
          CONNECTED: ${{ needs['connected-e2e'].result }}
          SUBPATH: ${{ needs['e2e-subpath'].result }}
        run: |
          printf '{\n  "commit": "%s",\n  "node": "24.x",\n  "web": "%s",\n  "api": "%s",\n  "model_contract": "%s",\n  "e2e": "%s",\n  "connected_e2e": "%s",\n  "subpath_e2e": "%s"\n}\n' \
            "$GITHUB_SHA" "$WEB" "$API" "$MODEL" "$E2E" "$CONNECTED" "$SUBPATH" | tee release-gate.json
          test "$WEB" = success
          test "$API" = success
          test "$MODEL" = success
          test "$E2E" = success
          test "$CONNECTED" = success
          test "$SUBPATH" = success
      - name: Upload machine-readable release proof
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ github.sha }}
          path: release-gate.json
          retention-days: 30
