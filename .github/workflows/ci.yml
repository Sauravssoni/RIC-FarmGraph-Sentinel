name: quality-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Lint
        run: npm run lint --workspace apps/web
      - name: Typecheck
        run: npm run typecheck --workspace apps/web
      - name: Unit tests
        run: npm run test --workspace apps/web
      - name: Production build (static export)
        run: npm run build --workspace apps/web

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r apps/api/requirements.txt pytest
      - name: API tests (in-memory persistence; conftest sets FGR_PERSIST=memory)
        run: cd apps/api && python3 -m pytest tests/ -q

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Build static export
        run: npm run build --workspace apps/web
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e (golden + negative path + responsive)
        run: npm run e2e
        env:
          PLAYWRIGHT_NO_EXECUTABLE_PATH: "1"

  # Production-subpath proof: build with the GitHub Pages project-site base
  # path, serve ONLY under /<repo>/, and run the full e2e suite plus
  # base-path asset checks (manifest, sw.js, ONNX model, wasm, labels).
  e2e-subpath:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Regenerate deterministic seed
        run: python3 data/demo/generate_seed.py
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e under GitHub Pages base path
        run: npm run e2e:subpath
        env:
          PLAYWRIGHT_NO_EXECUTABLE_PATH: "1"

  # Advisory dependency/secret scanning. Report-first (continue-on-error)
  # until the next planned dependency-bump cycle; results are visible in the
  # job log on every push. This is labelled deliberately — we do not claim a
  # clean SBOM we have not yet remediated.
  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high severity and above)
        run: npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (API dependencies)
        run: |
          pip install pip-audit
          pip-audit -r apps/api/requirements.txt
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
